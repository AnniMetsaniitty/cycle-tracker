spring.datasource.url=${CYCLE_TRACKER_DB_URL:jdbc:postgresql://localhost:5432/cycletracker}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${CYCLE_TRACKER_DB_USERNAME}
spring.datasource.password=${CYCLE_TRACKER_DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${CYCLE_TRACKER_DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${CYCLE_TRACKER_DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${CYCLE_TRACKER_DB_CONNECTION_TIMEOUT_MS:30000}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
